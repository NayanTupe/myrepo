<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Version Slide</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f4f4f4;
  text-align:center;
  padding:50px;
}

h1{
  color:white;
  background: linear-gradient(90deg,#ff6a00,#ee0979);
  padding:15px;
  border-radius:10px;
  margin:15px auto;
  width:60%;
}

button{
  background:#007bff;
  color:white;
  padding:10px 20px;
  border:none;
  border-radius:6px;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  background:#0056b3;
}

/* slide panel */
.slide{
  position:fixed;
  top:0;
  right:-100%;
  width:400px;
  height:100%;
  background:white;
  box-shadow:-5px 0 10px rgba(0,0,0,0.2);
  transition:0.4s;
  padding:20px;
}

.slide img{
  width:100%;
  border-radius:10px;
}

.slide.active{
  right:0;
}
</style>

</head>

<body>

<h1>This is version v2</h1>
<h1>This is version v5</h1>

<button onclick="openSlide()">Show Version Image</button>

<div class="slide" id="slide">
<h2>Version Image</h2>
<img src="version.jpg" alt="version image">
</div>

<script>
function openSlide(){
  document.getElementById("slide").classList.add("active");
}
</script>

</body>
</html>
